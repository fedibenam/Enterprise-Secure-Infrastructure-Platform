apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-simulator
  namespace: platform
  labels:
    app.kubernetes.io/name: platform-simulator
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-simulator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-simulator
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
      containers:
        - name: simulator
          image: nginx:1.27.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 101
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: var-run
              mountPath: /var/run
            - name: var-cache-nginx
              mountPath: /var/cache/nginx
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: tmp
          emptyDir: {}
        - name: var-run
          emptyDir: {}
        - name: var-cache-nginx
          emptyDir: {}
        - name: nginx-conf
          configMap:
            name: platform-simulator-nginx-conf
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-simulator-nginx-conf
  namespace: platform
data:
  nginx.conf: |
    worker_processes 1;
    pid /tmp/nginx.pid;
    events { worker_connections 1024; }
    http {
      server {
        listen 8080;
        location / {
          return 200 'ok';
          add_header Content-Type text/plain;
        }
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: platform-simulator
  namespace: platform
  labels:
    app.kubernetes.io/name: platform-simulator
spec:
  selector:
    app.kubernetes.io/name: platform-simulator
  ports:
    - name: http
      port: 80
      targetPort: 8080